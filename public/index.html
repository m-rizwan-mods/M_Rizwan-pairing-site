<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>M RIZWAN MDX - Pairing</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --glass-bg: rgba(255, 255, 255, 0.15);
      --glass-border: rgba(255, 255, 255, 0.3);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; padding: 15px;
    }
    .container {
      width: 100%; max-width: 420px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 30px;
      border: 1px solid var(--glass-border);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      color: #fff;
      text-align: center;
    }
    .title {
      font-size: 28px; font-weight: 700;
      background: linear-gradient(90deg, #fff, #ddd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    .subtitle { font-size: 14px; opacity: 0.8; margin-bottom: 25px; }
    
    .social-icons { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; }
    .social-icons a {
      width: 50px; height: 50px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 22px; text-decoration: none;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid var(--glass-border);
      transition: all 0.3s ease;
    }
    .social-icons a:hover { transform: translateY(-4px) scale(1.1); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
    .social-icons a.whatsapp { background: rgba(37, 211, 102, 0.3); }
    .social-icons a.github { background: rgba(51, 51, 51, 0.3); }
    .social-icons a.telegram { background: rgba(0, 136, 204, 0.3); }

    .input-field {
      width: 100%; padding: 14px; border-radius: 14px;
      margin-top: 12px; font-size: 15px; font-family: 'Poppins';
      background: rgba(255, 255, 255, 0.1);
      border: 1.5px solid var(--glass-border);
      color: #fff; outline: none;
    }
    .input-field::placeholder { color: rgba(255, 255, 255, 0.6); }
    .input-field:focus { border-color: #fff; }

    .generate-btn {
      width: 100%; padding: 14px; border-radius: 14px;
      margin-top: 15px; font-size: 16px; font-weight: 600;
      background: #fff; color: #764ba2;
      border: none; cursor: pointer;
      transition: all 0.3s ease;
    }
    .generate-btn:hover { transform: scale(1.03); box-shadow: 0 4px 20px rgba(255,255,255,0.3); }

    .code-display {
      width: 100%; padding: 16px; border-radius: 14px;
      margin-top: 15px; font-size: 18px; font-weight: 700;
      background: rgba(0, 0, 0, 0.2);
      border: 1.5px dashed var(--glass-border);
      min-height: 50px; display: flex; align-items: center; justify-content: center;
      letter-spacing: 2px;
    }
    .footer { font-size: 12px; margin-top: 20px; opacity: 0.7; }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="title">RIZWAN MDX</h1>
    <p class="subtitle">Link your WhatsApp device securely</p>
    
    <div class="social-icons">
      <a href="https://whatsapp.com/channel/0029Vb4Jh4wHgZWirfaYva0H" target="_blank" class="whatsapp"><i class="fab fa-whatsapp"></i></a>
      <a href="https://github.com/m-rizwan-mods/Rizwan-mdx-bot" target="_blank" class="github"><i class="fab fa-github"></i></a>
      <a href="https://t.me/M_RIZWAN_BOTZ" target="_blank" class="telegram"><i class="fab fa-telegram"></i></a>
    </div>

    <input type="text" id="mobileNumber" class="input-field" placeholder="92300xxxxxxx">
    <button class="generate-btn" id="submit">Generate Pair Code ✨</button>
    <div class="code-display" id="codeDisplay">CODE HERE</div>
    <p class="footer">© 2026 M RIZWAN | RIZWAN MDX</p>
  </div>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
  <script>
    document.getElementById("submit").addEventListener("click", async () => {
      const num = document.getElementById("mobileNumber").value.replace(/[^0-9]/g, "");
      if (!num) return alert("Number dalo bhai");
      document.getElementById("codeDisplay").innerText = "Loading...";
      try {
        const res = await axios(`/pair?number=${num}`);
        document.getElementById("codeDisplay").innerText = res.data.code || "Error";
      } catch (e) {
        document.getElementById("codeDisplay").innerText = "Error. Try again";
      }
    });
  </script>
</body>
</html>
